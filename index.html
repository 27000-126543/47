<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市应急指挥与资源调度平台</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <div id="login-page" class="login-page">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">
                        <svg viewBox="0 0 64 64" width="64" height="64">
                            <polygon points="32,4 58,24 48,60 16,60 6,24" fill="#e74c3c"/>
                            <path d="M32 20 L32 44 M22 34 L42 34" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h1>城市应急指挥与资源调度平台</h1>
                    <p>Urban Emergency Command & Resource Dispatch Platform</p>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <label>选择登录角色</label>
                        <div class="role-selector">
                            <div class="role-card" data-role="commander">
                                <div class="role-icon">🎯</div>
                                <div class="role-name">指挥中心</div>
                                <div class="role-desc">事件调度与指挥</div>
                            </div>
                            <div class="role-card" data-role="dispatcher">
                                <div class="role-icon">🚒</div>
                                <div class="role-name">现场处置员</div>
                                <div class="role-desc">现场处置与报告</div>
                            </div>
                            <div class="role-card" data-role="supplier">
                                <div class="role-icon">📦</div>
                                <div class="role-name">物资管理员</div>
                                <div class="role-desc">物资管理与采购</div>
                            </div>
                            <div class="role-card" data-role="analyst">
                                <div class="role-icon">📊</div>
                                <div class="role-name">数据分析员</div>
                                <div class="role-desc">数据分析与报表</div>
                            </div>
                            <div class="role-card" data-role="manager">
                                <div class="role-icon">👔</div>
                                <div class="role-name">管理层</div>
                                <div class="role-desc">风险管控与决策</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" value="admin">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" value="123456">
                    </div>
                    <button class="btn btn-primary btn-block" id="login-btn">登 录</button>
                </div>
                <div class="login-footer">
                    <p>© 2026 城市应急管理局 | 版本 v2.6.0</p>
                </div>
            </div>
        </div>

        <div id="main-app" class="main-app hidden">
            <header class="app-header">
                <div class="header-left">
                    <div class="logo-small">
                        <svg viewBox="0 0 64 64" width="36" height="36">
                            <polygon points="32,4 58,24 48,60 16,60 6,24" fill="#e74c3c"/>
                        </svg>
                    </div>
                    <div class="app-title">
                        <h2>城市应急指挥与资源调度平台</h2>
                        <span id="current-role-label" class="role-badge"></span>
                    </div>
                </div>
                <div class="header-center">
                    <div class="status-bar">
                        <div class="status-item">
                            <span class="status-dot active"></span>
                            <span>系统正常</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">当前事件:</span>
                            <span id="active-events-count" class="status-value warning">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">在线人员:</span>
                            <span id="online-staff" class="status-value success">0</span>
                        </div>
                        <div class="status-item">
                            <span id="current-time" class="status-time"></span>
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="notification-icon" id="notification-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span id="notification-badge" class="badge hidden">0</span>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="user-avatar">A</div>
                        <div class="user-detail">
                            <span id="user-name">Admin</span>
                            <small id="user-role-text"></small>
                        </div>
                    </div>
                    <button class="btn btn-ghost" id="logout-btn">退出</button>
                </div>
            </header>

            <div class="notification-panel" id="notification-panel">
                <div class="panel-header">
                    <h3>消息通知</h3>
                    <button class="btn-link" id="mark-all-read">全部已读</button>
                </div>
                <div class="notification-list" id="notification-list"></div>
            </div>

            <div class="app-body">
                <aside class="sidebar">
                    <nav class="side-menu" id="side-menu"></nav>
                </aside>
                <main class="main-content" id="main-content"></main>
            </div>
        </div>
    </div>

    <div id="modal-container"></div>
    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/commander.js"></script>
    <script src="js/dispatcher.js"></script>
    <script src="js/supplier.js"></script>
    <script src="js/analyst.js"></script>
    <script src="js/manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
